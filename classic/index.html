<!DOCTYPE html>
<!-- Classic Solitaire using div for the cards - not a pwa for now -->
<html lang=en>
<head>
<!--  <link rel="manifest" href="manifest.json"> -->
	<meta name="google" content="notranslate">
 	<link rel="canonical" href="https://jcoonrod.github.io/classic" />
  	<link rel='shortcut icon' href='/back.png'>
  	<meta charset="utf-8">
  	<meta name="viewport" content="width=device-width">
  	<meta name="theme-color" content="green"/>
  	<meta name="description" content="Classic Solitaire Game by John Coonrod"/>
	<title>Classic Solitaire</title>
	<link rel="stylesheet" href="classic.css">
  <script src="classic.js" defer></script>
</head>
  
<body tabindex="-1">
	<p>Classic Solitaire
		<button onclick="shuffle(); deal();">New</button>
		<button onclick="deal();">Replay</button>
    <a href="/">Freecell</a><a href="/spider"> Spider</a>
  </p>
<!--First row is the reserve (r0) dealt from reserve (s0-2) and foundation piles (a0-3)-->
<div class=row>
  <div id=r0 class=card onclick="if(ndealt<ncards)next3();"><img src=/back.jpg draggable="false" width=100% height=100%></div> 
  <div id=s0 class="card blueborder" onclick="tryDrop(this);"></div>
  <div id=s1 class="card blueborder" onclick="tryDrop(this);"></div>
  <div id=s2 class="card blueborder" onclick="tryDrop(this);"></div>
  <div id=a0 class="card redborder"></div>
  <div id=a1 class="card redborder"></div>
  <div id=a2 class="card redborder"></div>
  <div id=a3 class="card redborder"></div>
</div>
<!-- make sure the blank row has some space-->
<div class=row><h1>&nbsp;</h1></div>

<div class=row>
  <div id=c0 class=c></div>
  <div id=c1 class=c></div>
  <div id=c2 class=c></div>
  <div id=c3 class=c></div>
  <div id=c4 class=c></div>
  <div id=c5 class=c></div>
  <div id=c6 class=c></div>
</div>
</body>
</html>
