<!DOCTYPE html>
<!-- FreeCell using div and emoji 1.1 for the cards - all in one HTML page -->
<!-- Explanation of differences from base as they occur-->
<!-- Includes a workaround for Servo to ensure row and cards all have lower z-index than the column onclick-->
<html lang=en>
<head>
  <link rel="canonical" href="https://jcoonrod.github.io/div" />
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta name="google" content="notranslate">
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="theme-color" content="green"/>
  <meta name="description" content="FreeCell Game by John Coonrod using DIV instead of images"/>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
	<title>Freecell via DIV</title>
</head>
  
<body>
  <p>One-click FreeCell 2.5
  <button onclick="shuffle(); deal()">New Game</button>
  <button onclick="deal()">Replay</button>
  <button onclick="undo()">Undo</button>
	<span id=xt>  </span>
  </p>
  <div class=row>
  <div id=s0 class=card onclick="dropFree(0);"></div>
  <div id=s1 class=card onclick="dropFree(1);"></div>
  <div id=s2 class=card onclick="dropFree(2);"></div>
  <div id=s3 class=card onclick="dropFree(3);"></div>
  <div id=a0 class=card></div>
  <div id=a1 class=card></div>
  <div id=a2 class=card></div>
  <div id=a3 class=card></div>
</div>
<div class=row>&nbsp;</div>
<div class=row>
  <div id=c0 class=c onclick="popStack(0);"></div>
  <div id=c1 class=c onclick="popStack(1);"></div>
  <div id=c2 class=c onclick="popStack(2);"></div>
  <div id=c3 class=c onclick="popStack(3);"></div>
  <div id=c4 class=c onclick="popStack(4);"></div>
  <div id=c5 class=c onclick="popStack(5);"></div>
  <div id=c6 class=c onclick="popStack(6);"></div>
  <div id=c7 class=c onclick="popStack(7);"></div>
</div>

</body>
</html>
