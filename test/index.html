<!DOCTYPE html>
<html lang=en>
<head>
  <link rel="canonical" href="https://jcoonrod.github.io/test" />
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta name="google" content="notranslate">
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="theme-color" content="green"/>
  <meta name="description" content="FreeCell Game by John Coonrod using DIV instead of images"/>
	<title>Freecell via DIV</title>
  <style>
  @font-face {
			font-family: 'Noto Sans Symbols 2';
			src: url('NotoSansSymbols2-Regular.ttf') format('truetype');
			font-weight: normal;font-style: normal;font-display: swap;
		}
   body {font-family: sans-serif,'Noto Sans Symbols 2'; background:green;padding:0;margin:0;}
    p, p>a {color:white;}
    div.row {display:flex; position:relative; justify-content:space-evenly;z-index:0;}
    div.a {position:absolute;background:red;color:white;top:40%;left:40%;padding:1vw;font-size:3vw;}
    div.c {height:80vw;width:12.5vw;position:relative;z-index:200;padding:0;border:0;margin:0;}
    .r {color:red;}
    .b {color:black;}
    h2{font-size:3vw;padding:0;margin:0;font-weight:bold;}
    h1{font-size:8vw;padding:0;margin:0;font-weight:normal;text-align: center;}
    .card {
      background: white;
      padding: 0.5vw;margin:0;
      border-style: solid;
      border-radius: 1vw;
      border-color:black; border-width:0.5vw;
      width:10vw; 
      height:17vw;
      }
  </style>
</head>
  
<body tabindex="-1">
<script>
  function popStack(j){
    xtp=document.getElementById("xt");
		xtp.textContent="j="+j;
  }
</script>
  <p>Onclick Test</p>
  <div class="row">
    <div class="c" onclick="popStack(3);">
      <div class="card">
        <h2>Test</h2>
        <h2 id="xt">click me...</h2>
      </div>
    </div>
  </div>
</body>
</html>
