<!DOCTYPE html>
<html lang=en>
<head>
  <link rel="canonical" href="https://jcoonrod.github.io/test" />
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta name="google" content="notranslate">
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="theme-color" content="green"/>
  <meta name="description" content="FreeCell Game by John Coonrod using DIV instead of images"/>
	<title>Minimal Div Onclick Test</title>
  <style>
   body {font-family: sans-serif; background:green;padding:0;margin:0;}
    p, p>a {color:white;}
    div.row {display:flex; position:relative; justify-content:space-evenly;}
    div.column {height:20vw;width:12.5vw;position:relative;padding:0;border:0;margin:0;}
    .r {color:red;}
    .b {color:black;}
    h2{font-size:3vw;padding:0;margin:0;font-weight:bold;}
    h1{font-size:8vw;padding:0;margin:0;font-weight:normal;text-align: center;}
    .card {
      background: white;
      padding: 0.5vw;margin:0;
      border-style: solid;
      border-radius: 1vw;
      border-color:black; border-width:0.5vw;
      width:10vw; 
      height:17vw;
      }
  </style>
  <script>
    function showMe(x){alert(x);}
  </script>
</head>
<body>
  <h2>Minimal Div Onclick Test</h2>
  <p onclick="showMe('Clicked on p tag');">First test it on a p tag</p>
  <div onclick="showMe('Clicked on singular div tag');">First test it on singular div tag</div>
  <div class="row" onclick="showMe('Clicked on top level div');">
    <div class="column" ">
      <div class="card">
        <h2>On row</h2>
        <h2 id="xt">click me...</h2>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="column" onclick="showMe('Clicked on second level div');">
      <div class="card">
        <h2>Test</h2>
        <h2 id="xt">click me...</h2>
      </div>
    </div>
    <div class="column">
      <div class="card" onclick="showMe('Clicked on third level div');">
        <h2>Test</h2>
        <h2 id="xt">click me...</h2>
      </div>
    </div>
  </div>
</body>
</html>
